<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instituto Nacional de Juayúa</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    .carousel-inner img {
      width: 100%;
      height: 500px;
      object-fit: cover;
    }

    .carousel-caption {
      background: rgba(0, 0, 0, 0.55);
      padding: 15px;
      border-radius: 10px;
    }

    .navbar-brand img {
      width: 40px;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
    <a class="navbar-brand" href="#">
      INJ
    </a>

    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="#">Inicio</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">Sobre nosotros</a>
      </li>

      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" id="navbardrop" data-toggle="dropdown">
          Quiénes somos
        </a>

        <div class="dropdown-menu">
          <a class="dropdown-item" href="#">Misión</a>
          <a class="dropdown-item" href="#">Visión</a>
          <a class="dropdown-item" href="#">Valores</a>
        </div>
      </li>
    </ul>
  </nav>

  <div id="demo" class="carousel slide" data-ride="carousel">

    <ul class="carousel-indicators">
      <li data-target="#demo" data-slide-to="0" class="active"></li>
      <li data-target="#demo" data-slide-to="1"></li>
    </ul>

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="imagen1.jpg" alt="Proyecto de vida y carrera">
        <div class="carousel-caption">
          <h3>Proyecto de Vida y Carrera</h3>
          <p>Estudiantes del Instituto Nacional de Juayúa participando en actividades educativas.</p>
        </div>
      </div>

      <div class="carousel-item">
        <img src="imagen2.jpg" alt="Práctica estudiantil">
        <div class="carousel-caption">
          <h3>Formación Profesional</h3>
          <p>Experiencias prácticas que fortalecen el aprendizaje y el trabajo en equipo.</p>
        </div>
      </div>

    </div>

    <a class="carousel-control-prev" href="#demo" data-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </a>

    <a class="carousel-control-next" href="#demo" data-slide="next">
      <span class="carousel-control-next-icon"></span>
    </a>

  </div>

</body>
</html>
